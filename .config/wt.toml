[post-create]
# deps = "uv sync && cd app/web_ui && npm install"

[pre-remove]
session = "zellij delete-session {{ branch | sanitize }} 2>/dev/null || true"
ports = """
PORT={{ branch | hash_port }}
lsof -ti :$PORT -sTCP:LISTEN | xargs kill 2>/dev/null || true
lsof -ti :$((PORT + 1)) -sTCP:LISTEN | xargs kill 2>/dev/null || true
"""

[list]
url = "http://localhost:{{ branch | hash_port }}"
